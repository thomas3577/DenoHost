name: Check for new Deno release

on:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check_new_deno:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - name: Check Deno release and create tag
        id: deno-check
        uses: ./.github/actions/deno-release-check
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Display results
        run: |
          if [[ "${{ steps.deno-check.outputs.already-exists }}" == "true" ]]; then
            echo "Tag already exists, no action needed"
          else
            echo "Created PR #${{ steps.deno-check.outputs.pr-number }} on branch ${{ steps.deno-check.outputs.branch-name }}"
          fi
