name: Build and Publish NuGet Package

permissions:
  contents: write
  packages: write

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  get-version:
    name: Determine Deno Version
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.extract.outputs.package_version }}
      deno_version: ${{ steps.extract.outputs.deno_version }}
      tag_name: ${{ steps.extract.outputs.tag_name }}
      is_prerelease: ${{ steps.extract.outputs.is_prerelease }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Extract Version
        id: extract
        run: |
          # Single source of truth: Directory.Build.props
          DENO_VERSION=$(grep '<DenoVersion>' Directory.Build.props | sed -E 's:.*<DenoVersion>(.*)</DenoVersion>.*:\1:')

          # Check if this is a tagged release
          if [[ "$GITHUB_REF" =~ ^refs/tags/v[0-9] ]]; then
            # Tagged release
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            SEMVER_TAG="${TAG_NAME#v}"
            SEMVER_REGEX='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'

            if ! [[ "$SEMVER_TAG" =~ $SEMVER_REGEX ]]; then
              echo "::error::Invalid tag '$TAG_NAME'. Expected format vX.Y.Z or vX.Y.Z-prerelease."
              exit 1
            fi

            PACKAGE_VERSION="$SEMVER_TAG"

            # Any semver suffix indicates prerelease (e.g. -alpha.1, -hotfix.1)
            IS_PRERELEASE="false"
            if [[ "$TAG_NAME" == *-* ]]; then
              IS_PRERELEASE="true"
              echo "Detected prerelease tag: $TAG_NAME"
            fi
          else
            # Development build (main branch)
            PACKAGE_VERSION="${DENO_VERSION}-dev"
            TAG_NAME="v${DENO_VERSION}-dev"
            IS_PRERELEASE="true"
          fi

          echo "package_version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT
          echo "deno_version=$DENO_VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "##[notice]NuGet version: $PACKAGE_VERSION"
          echo "##[notice]Deno version: $DENO_VERSION"
          echo "##[notice]Tag name: $TAG_NAME"
          echo "##[notice]Is prerelease: $IS_PRERELEASE"

  quality-checks:
    name: Quality Checks
    needs: get-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Check for Vulnerable Packages
        run: |
          OUTPUT=$(dotnet list DenoHost.sln package --vulnerable --include-transitive --format json)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q '"severity"'; then
            echo "::error::Vulnerable packages detected!"
            exit 1
          fi

      - name: Verify Signing Key Pair
        shell: pwsh
        env:
          DENOHOST_METADATA_SIGNING_PRIVATE_KEY_PEM: ${{ secrets.DENOHOST_METADATA_SIGNING_PRIVATE_KEY_PEM }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:DENOHOST_METADATA_SIGNING_PRIVATE_KEY_PEM)) {
            throw 'Build requires DENOHOST_METADATA_SIGNING_PRIVATE_KEY_PEM secret.'
          }

          $privatePem = $env:DENOHOST_METADATA_SIGNING_PRIVATE_KEY_PEM
          $repoPem = Get-Content ./Config/metadata-signing-public.pem -Raw

          $privateKey = [System.Security.Cryptography.ECDsa]::Create()
          $privateKey.ImportFromPem($privatePem)

          $repoKey = [System.Security.Cryptography.ECDsa]::Create()
          $repoKey.ImportFromPem($repoPem)

          try {
            $fromPrivate = $privateKey.ExportSubjectPublicKeyInfo()
            $fromRepo = $repoKey.ExportSubjectPublicKeyInfo()

            if ($fromPrivate.Length -ne $fromRepo.Length -or -not [System.Linq.Enumerable]::SequenceEqual($fromPrivate, $fromRepo)) {
              throw 'The signing private key secret does not match Config/metadata-signing-public.pem.'
            }
          }
          finally {
            $privateKey.Dispose()
            $repoKey.Dispose()
          }

      - name: Lint (dotnet format)
        run: dotnet format DenoHost.sln --verify-no-changes --severity warn

  tag-validation:
    name: Validate Stable Tag Source
    needs: get-version
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify stable tag has matching alpha.N on same commit
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF#refs/tags/v}"
          SEMVER_REGEX='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'

          if ! [[ "$TAG_NAME" =~ $SEMVER_REGEX ]]; then
            echo "::error::Invalid tag 'v$TAG_NAME'. Expected format vX.Y.Z or vX.Y.Z-prerelease."
            exit 1
          fi

          if [[ "$TAG_NAME" == *-* ]]; then
            echo "Prerelease tag detected: v$TAG_NAME. Skipping stable alpha gate."
            exit 0
          fi

          git fetch --tags --force
          STABLE_SHA="$(git rev-list -n 1 "$GITHUB_REF")"

          ESCAPED_TAG_NAME="${TAG_NAME//./\\.}"
          MATCHING_ALPHA_TAGS="$(git tag --points-at "$STABLE_SHA" --list "v${TAG_NAME}-alpha.*" | grep -E "^v${ESCAPED_TAG_NAME}-alpha\\.[0-9]+$" || true)"

          if [[ -z "$MATCHING_ALPHA_TAGS" ]]; then
            echo "::error::Stable release v$TAG_NAME requires a matching prerelease tag v$TAG_NAME-alpha.N on the same commit."
            echo "::error::stable sha: $STABLE_SHA"
            exit 1
          fi

          echo "Stable tag v$TAG_NAME is valid: matching alpha tag(s) found on same commit:"
          echo "$MATCHING_ALPHA_TAGS"

  build-runtime:
    name: Build Runtime Packages
    needs: [get-version, quality-checks]
    strategy:
      matrix:
        include:
          - rid: win-x64
            proj: DenoHost.Runtime.win-x64/DenoHost.Runtime.win-x64.csproj
            os: windows-latest
          - rid: win-arm64
            proj: DenoHost.Runtime.win-arm64/DenoHost.Runtime.win-arm64.csproj
            os: windows-latest
          - rid: linux-x64
            proj: DenoHost.Runtime.linux-x64/DenoHost.Runtime.linux-x64.csproj
            os: ubuntu-latest
          - rid: linux-arm64
            proj: DenoHost.Runtime.linux-arm64/DenoHost.Runtime.linux-arm64.csproj
            os: ubuntu-latest
          - rid: osx-x64
            proj: DenoHost.Runtime.osx-x64/DenoHost.Runtime.osx-x64.csproj
            os: ubuntu-latest
          - rid: osx-arm64
            proj: DenoHost.Runtime.osx-arm64/DenoHost.Runtime.osx-arm64.csproj
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Pack Runtime Package
        shell: bash
        env:
          DENOHOST_METADATA_SIGNING_PRIVATE_KEY_PEM: ${{ secrets.DENOHOST_METADATA_SIGNING_PRIVATE_KEY_PEM }}
        run: |
          if [ -z "${DENOHOST_METADATA_SIGNING_PRIVATE_KEY_PEM}" ]; then
            echo "::error::Build requires DENOHOST_METADATA_SIGNING_PRIVATE_KEY_PEM secret."
            exit 1
          fi

          VERSION=${{ needs.get-version.outputs.package_version }}
          dotnet pack ${{ matrix.proj }} -c Release -p:Version=$VERSION --output ./nupkg/runtime/${{ matrix.rid }}

      - name: Validate Runtime Package Contents
        shell: pwsh
        run: |
          $rid = '${{ matrix.rid }}'
          $package = Get-ChildItem "./nupkg/runtime/$rid/*.nupkg" | Select-Object -First 1
          if ($null -eq $package) {
            throw "No package found under ./nupkg/runtime/$rid"
          }

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $archive = [System.IO.Compression.ZipFile]::OpenRead($package.FullName)
          try {
            $entries = $archive.Entries | ForEach-Object { $_.FullName }
            $binaryName = if ($rid.StartsWith('win-')) { 'deno.exe' } else { 'deno' }

            $expected = @(
              "runtimes/$rid/native/$binaryName",
              "runtimes/$rid/native/deno.metadata.json",
              "runtimes/$rid/native/deno.metadata.sig"
            )

            foreach ($entry in $expected) {
              if (-not ($entries -contains $entry)) {
                throw "Package '$($package.Name)' is missing required entry: $entry"
              }
            }

            Write-Host "Runtime package '$($package.Name)' contains all required security artifacts."
          }
          finally {
            $archive.Dispose()
          }

      - name: Upload Runtime Package
        uses: actions/upload-artifact@v7
        with:
          name: DenoHost.Runtime.${{ matrix.rid }}.${{ needs.get-version.outputs.package_version }}
          path: ./nupkg/runtime/${{ matrix.rid }}/*.nupkg
          retention-days: 7

  build-core:
    name: Build Core Package
    needs: [get-version, build-runtime]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Display .NET Info
        run: dotnet --info

      - name: Build Core Project
        run: dotnet build DenoHost.Core/DenoHost.Core.csproj -c Release

      - name: Pack Core Project
        run: |
          VERSION=${{ needs.get-version.outputs.package_version }}
          dotnet pack DenoHost.Core/DenoHost.Core.csproj -c Release -p:Version=$VERSION --output ./nupkg/core

      - name: Upload Core Package as Artifact
        uses: actions/upload-artifact@v7
        with:
          name: DenoHost.Core.${{ needs.get-version.outputs.package_version }}
          path: ./nupkg/core/*.nupkg
          retention-days: 7

  test-on-windows:
    name: Run Tests on windows
    needs: [build-core, build-runtime]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Build Test Project (Release, win-x64)
        env:
          DENOHOST_METADATA_SIGNING_PRIVATE_KEY_PEM: ${{ secrets.DENOHOST_METADATA_SIGNING_PRIVATE_KEY_PEM }}
        run: dotnet build DenoHost.Tests/DenoHost.Tests.csproj -c Release -r win-x64

      - name: Check deno.exe exists
        shell: bash
        run: test -f DenoHost.Tests/bin/Release/net9.0/win-x64/runtimes/win-x64/native/deno.exe

      - name: Run Unit Tests with Coverage
        run: dotnet test DenoHost.Tests/DenoHost.Tests.csproj -c Release -r win-x64 --no-build --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate Coverage Report
        run: reportgenerator -reports:"coverage/**/coverage.cobertura.xml" -targetdir:"coverage-report" -reporttypes:"Cobertura;Badges"

      - name: Upload Coverage Reports to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage-report/Cobertura.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  test-on-linux:
    name: Run Tests on linux
    needs: [build-core, build-runtime]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Build Test Project (Release, linux-x64)
        env:
          DENOHOST_METADATA_SIGNING_PRIVATE_KEY_PEM: ${{ secrets.DENOHOST_METADATA_SIGNING_PRIVATE_KEY_PEM }}
        run: dotnet build DenoHost.Tests/DenoHost.Tests.csproj -c Release -r linux-x64

      - name: Check deno exists
        shell: bash
        run: test -f DenoHost.Tests/bin/Release/net9.0/linux-x64/runtimes/linux-x64/native/deno

      - name: Run Unit Tests
        run: dotnet test DenoHost.Tests/DenoHost.Tests.csproj -c Release -r linux-x64 --no-build

  smoke-test-packaged:
    name: Smoke Test Packaged Runtime
    needs: [get-version, build-core, build-runtime]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Download Core Artifact
        uses: actions/download-artifact@v8
        with:
          name: DenoHost.Core.${{ needs.get-version.outputs.package_version }}
          path: ./nupkg/core

      - name: Download Linux Runtime Artifact
        uses: actions/download-artifact@v8
        with:
          name: DenoHost.Runtime.linux-x64.${{ needs.get-version.outputs.package_version }}
          path: ./nupkg/runtime/linux-x64

      - name: Verify bypass is not enabled
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${DENOHOST_ALLOW_CHECKSUM_BYPASS:-}" ]]; then
            echo "::error::DENOHOST_ALLOW_CHECKSUM_BYPASS must not be set during release smoke tests."
            exit 1
          fi

      - name: Create smoke test project and restore local packages
        shell: bash
        run: |
          set -euo pipefail
          rm -rf ./smoke-release
          dotnet new console -n smoke-release -f net9.0
          cd smoke-release
          dotnet nuget add source ../nupkg/core --name local-core
          dotnet nuget add source ../nupkg/runtime/linux-x64 --name local-runtime
          dotnet add package DenoHost.Core --version "${{ needs.get-version.outputs.package_version }}" --source local-core
          dotnet add package DenoHost.Runtime.linux-x64 --version "${{ needs.get-version.outputs.package_version }}" --source local-runtime

      - name: Run runtime smoke test without checksum bypass
        shell: bash
        run: |
          set -euo pipefail
          cd smoke-release
          cat > Program.cs <<'EOF'
          using DenoHost.Core;

          var result = await Deno.Execute<string>("eval", new[] { "console.log('smoke-ok')" });
          Console.WriteLine(result);

          if (string.IsNullOrWhiteSpace(result) || !result.Contains("smoke-ok", StringComparison.Ordinal))
          {
            Console.Error.WriteLine("Smoke test failed: expected output to contain 'smoke-ok'.");
            Environment.Exit(1);
          }
          EOF
          env -u DENOHOST_ALLOW_CHECKSUM_BYPASS dotnet run

  publish-runtime:
    name: Publish Runtime NuGet
    needs:
      [
        get-version,
        tag-validation,
        build-runtime,
        smoke-test-packaged,
        test-on-linux,
        test-on-windows,
      ]
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        rid: [win-x64, win-arm64, linux-x64, linux-arm64, osx-x64, osx-arm64]
    runs-on: ubuntu-latest

    steps:
      - name: Download Runtime Artifact
        uses: actions/download-artifact@v8
        with:
          name: DenoHost.Runtime.${{ matrix.rid }}.${{ needs.get-version.outputs.package_version }}
          path: ./nupkg/runtime/${{ matrix.rid }}

      - name: Ensure checksum bypass is disabled for publish
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${DENOHOST_ALLOW_CHECKSUM_BYPASS:-}" ]]; then
            echo "::error::DENOHOST_ALLOW_CHECKSUM_BYPASS must not be set during publish."
            exit 1
          fi

      - name: Push Runtime Package to NuGet
        run: dotnet nuget push ./nupkg/runtime/${{ matrix.rid }}/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }}

      - name: Push Runtime Package to GitHub Packages
        run: dotnet nuget push ./nupkg/runtime/${{ matrix.rid }}/*.nupkg --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --api-key ${{ secrets.GITHUB_TOKEN }}

  publish-core:
    name: Publish Core NuGet
    needs:
      [
        get-version,
        tag-validation,
        build-core,
        smoke-test-packaged,
        test-on-linux,
        test-on-windows,
      ]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: DenoHost.Core.${{ needs.get-version.outputs.package_version }}
          path: ./nupkg/core

      - name: Ensure checksum bypass is disabled for publish
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${DENOHOST_ALLOW_CHECKSUM_BYPASS:-}" ]]; then
            echo "::error::DENOHOST_ALLOW_CHECKSUM_BYPASS must not be set during publish."
            exit 1
          fi

      - name: Push Core Package to NuGet
        run: dotnet nuget push ./nupkg/core/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }}

      - name: Push Core Package to GitHub Packages
        run: dotnet nuget push ./nupkg/core/*.nupkg --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --api-key ${{ secrets.GITHUB_TOKEN }}

  verify-alpha-from-nuget:
    name: Verify Alpha Package From NuGet
    needs: [get-version, publish-runtime, publish-core]
    if: startsWith(github.ref, 'refs/tags/v') && needs.get-version.outputs.is_prerelease == 'true' && contains(needs.get-version.outputs.tag_name, '-alpha.')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Wait for NuGet package propagation
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.get-version.outputs.package_version }}"
          PACKAGES=("denohost.core" "denohost.runtime.linux-x64")
          MAX_ATTEMPTS=10

          wait_seconds() {
            case "$1" in
              1) echo 10 ;;
              2) echo 20 ;;
              3) echo 30 ;;
              4) echo 45 ;;
              *) echo 60 ;;
            esac
          }

          for package in "${PACKAGES[@]}"; do
            found="false"
            url="https://api.nuget.org/v3-flatcontainer/${package}/${VERSION}/${package}.${VERSION}.nupkg"
            echo "Waiting for $package $VERSION"

            for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
              if curl --silent --show-error --location --fail --output /dev/null "$url"; then
                echo "Found $package $VERSION on attempt $attempt"
                found="true"
                break
              fi

              delay="$(wait_seconds "$attempt")"
              if [[ "$attempt" -lt "$MAX_ATTEMPTS" ]]; then
                echo "$package $VERSION not visible yet (attempt $attempt/$MAX_ATTEMPTS). Retrying in ${delay}s..."
                sleep "$delay"
              fi
            done

            if [[ "$found" != "true" ]]; then
              echo "::error::Package $package $VERSION did not appear on nuget.org within timeout."
              exit 1
            fi
          done

      - name: Restore verify project with alpha packages from nuget.org
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.get-version.outputs.package_version }}"
          cd DenoHost.Verify
          dotnet nuget locals all --clear
          dotnet remove package DenoHost.Core || true
          dotnet remove package DenoHost.Runtime.linux-x64 || true
          dotnet add package DenoHost.Core --version "$VERSION" --source https://api.nuget.org/v3/index.json --no-restore
          dotnet add package DenoHost.Runtime.linux-x64 --version "$VERSION" --source https://api.nuget.org/v3/index.json --no-restore
          dotnet restore --source https://api.nuget.org/v3/index.json --force --no-cache

      - name: Run alpha verification and assert Deno runtime version
        shell: bash
        run: |
          set -euo pipefail
          cd DenoHost.Verify
          env -u DENOHOST_ALLOW_CHECKSUM_BYPASS dotnet run -- "${{ needs.get-version.outputs.deno_version }}"

  create-release:
    name: Create GitHub Release
    needs: [get-version, publish-runtime, publish-core, verify-alpha-from-nuget]
    if: startsWith(github.ref, 'refs/tags/v') && (needs.get-version.outputs.is_prerelease != 'true' || needs.verify-alpha-from-nuget.result == 'success')
    runs-on: ubuntu-latest
    steps:
      # Download all artifacts to attach to release
      - name: Download Core Package
        uses: actions/download-artifact@v8
        with:
          name: DenoHost.Core.${{ needs.get-version.outputs.package_version }}
          path: ./nupkg/core

      - name: Download Runtime Packages
        uses: actions/download-artifact@v8
        with:
          pattern: DenoHost.Runtime.*.${{ needs.get-version.outputs.package_version }}
          path: ./nupkg/runtime
          merge-multiple: true

      - name: Generate SHA-256 files for release assets
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            sha256sum "$file" > "$file.sha256"
          done < <(find ./nupkg -type f -name "*.nupkg" -print0)

      - name: Create GitHub Release with Auto-Generated Notes
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.get-version.outputs.tag_name }}
          name: ${{ needs.get-version.outputs.tag_name }}
          body: |
            ## Deno Version
            Update to Deno [v${{ needs.get-version.outputs.deno_version }}](https://github.com/denoland/deno/releases/tag/v${{ needs.get-version.outputs.deno_version }})
          prerelease: ${{ needs.get-version.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
          files: |
            ./nupkg/core/*.nupkg
            ./nupkg/core/*.nupkg.sha256
            ./nupkg/runtime/**/*.nupkg
            ./nupkg/runtime/**/*.nupkg.sha256
